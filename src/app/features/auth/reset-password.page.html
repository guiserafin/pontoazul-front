<section class="login">
  <form class="login__card" [formGroup]="form" (ngSubmit)="onSubmit()" novalidate>
    <div class="login__brand" aria-hidden="true">
      <img
        class="login__logo"
        src="assets/images/logo-transparente.png"
        width="180"
        height="48"
        alt=""
        priority
      />
    </div>

    <header class="login__header">
      <h1 class="login__title">Redefinir senha</h1>
      <p class="login__subtitle">Crie uma nova senha para acessar sua conta.</p>
    </header>

    @if (successMessage()) {
      <p class="login__success" role="status">{{ successMessage() }}</p>
    }

    @if (errorMessage()) {
      <p class="login__error" role="alert">{{ errorMessage() }}</p>
    }

    @if (hasToken() && !successMessage()) {
      <label class="login__field">
        <span class="login__label">Nova senha</span>
        <input
          type="password"
          formControlName="newPassword"
          class="login__input"
          [class.login__input--invalid]="newPasswordControl.invalid && newPasswordControl.touched"
          placeholder="********"
          autocomplete="new-password"
          minlength="6"
          required
        />
        @if (newPasswordControl.touched && newPasswordControl.hasError('required')) {
          <span class="login__field-error">Informe a nova senha.</span>
        }
        @if (newPasswordControl.touched && newPasswordControl.hasError('minlength')) {
          <span class="login__field-error">A senha deve ter no mínimo 6 caracteres.</span>
        }
      </label>

      <label class="login__field">
        <span class="login__label">Confirmar nova senha</span>
        <input
          type="password"
          formControlName="confirmPassword"
          class="login__input"
          [class.login__input--invalid]="
            (confirmPasswordControl.invalid || form.hasError('passwordsMismatch')) && confirmPasswordControl.touched
          "
          placeholder="********"
          autocomplete="new-password"
          required
        />
        @if (confirmPasswordControl.touched && confirmPasswordControl.hasError('required')) {
          <span class="login__field-error">Confirme a nova senha.</span>
        }
        @if (confirmPasswordControl.touched && form.hasError('passwordsMismatch')) {
          <span class="login__field-error">As senhas não coincidem.</span>
        }
      </label>

      <button type="submit" class="login__submit" [disabled]="isSubmitting()" [attr.aria-busy]="isSubmitting()">
        @if (isSubmitting()) {
          <span>Redefinindo...</span>
        } @else {
          <span>Redefinir senha</span>
        }
      </button>
    }

    <p class="login__aux">
      <a class="login__link" routerLink="/login">Voltar para o login</a>
    </p>
  </form>
</section>
