<section class="login">
  <form class="login__card" [formGroup]="form" (ngSubmit)="onSubmit()" novalidate>
    <div class="login__brand" aria-hidden="true">
      <img
        class="login__logo"
        src="assets/images/logo-transparente.png"
        width="180"
        height="48"
        alt=""
        priority
      />
    </div>

    <header class="login__header">
      <h1 class="login__title">Esqueci minha senha</h1>
      <p class="login__subtitle">Informe seu e-mail e enviaremos um link para redefinir sua senha.</p>
    </header>

    @if (successMessage()) {
      <p class="login__success" role="status">{{ successMessage() }}</p>
    }

    @if (errorMessage()) {
      <p class="login__error" role="alert">{{ errorMessage() }}</p>
    }

    <label class="login__field">
      <span class="login__label">E-mail</span>
      <input
        type="email"
        formControlName="email"
        class="login__input"
        [class.login__input--invalid]="emailControl.invalid && emailControl.touched"
        placeholder="nome@empresa.com"
        autocomplete="email"
        required
      />
      @if (emailControl.touched && emailControl.hasError('required')) {
        <span class="login__field-error">Informe seu e-mail.</span>
      }
      @if (emailControl.touched && emailControl.hasError('email')) {
        <span class="login__field-error">Informe um e-mail válido.</span>
      }
    </label>

    <button type="submit" class="login__submit" [disabled]="isSubmitting()" [attr.aria-busy]="isSubmitting()">
      @if (isSubmitting()) {
        <span>Enviando...</span>
      } @else {
        <span>Enviar link de redefinição</span>
      }
    </button>

    <p class="login__aux">
      <a class="login__link" routerLink="/login">Voltar para o login</a>
    </p>
  </form>
</section>
